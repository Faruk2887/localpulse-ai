name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk zlib1g-dev autoconf automake libtool cmake git zip unzip wget
        pip install buildozer cython pillow
    
    - name: Create icons
      run: |
        mkdir -p assets
        python -c "
        from PIL import Image, ImageDraw
        img = Image.new('RGBA', (1024, 1024), (79, 70, 229, 255))
        draw = ImageDraw.Draw(img)
        draw.ellipse([200, 200, 824, 824], fill=(16, 185, 129, 255))
        img.save('assets/icon.png')
        splash = Image.new('RGB', (1080, 1920), (79, 70, 229))
        splash.save('assets/splash.png')
        "

    - name: Setup Android SDK (old structure buildozer expects)
      run: |
        SDK=$HOME/.buildozer/android/platform/android-sdk
        
        # Download old-style SDK tools
        mkdir -p $SDK
        cd $SDK
        wget -q https://dl.google.com/android/repository/sdk-tools-linux-4333796.zip
        unzip -q sdk-tools-linux-4333796.zip
        rm sdk-tools-linux-4333796.zip
        
        # Accept licenses
        yes | $SDK/tools/bin/sdkmanager --licenses
        
        # Install build tools and platform
        $SDK/tools/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
        
        # Verify aidl exists
        ls $SDK/build-tools/33.0.0/aidl && echo "aidl found"
        
    - name: Build APK
      run: |
        buildozer android debug
    
    - uses: actions/upload-artifact@v4
      with:
        name: LocalPulseAI-APK
        path: bin/*.apk
