name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk openjdk-8-jdk zlib1g-dev autoconf automake libtool cmake git zip unzip wget
        pip install buildozer cython pillow
    - name: Create icons
      run: |
        mkdir -p assets
        python -c "from PIL import Image, ImageDraw; img = Image.new('RGBA', (1024, 1024), (79, 70, 229, 255)); draw = ImageDraw.Draw(img); draw.ellipse([200, 200, 824, 824], fill=(16, 185, 129, 255)); img.save('assets/icon.png'); splash = Image.new('RGB', (1080, 1920), (79, 70, 229)); splash.save('assets/splash.png')"
    - name: Debug SDK zip structure
      run: |
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -qo commandlinetools-linux-11076708_latest.zip
        echo "=== Top level ==="
        ls -la
        echo "=== cmdline-tools ==="
        ls -la cmdline-tools/ 2>/dev/null || echo "no cmdline-tools dir"
        echo "=== Find sdkmanager ==="
        find . -name "sdkmanager" -type f 2>/dev/null
        echo "=== Find all bins ==="
        find . -name "bin" -type d 2>/dev/null
    - name: Setup SDK
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        
        SDK=$HOME/.buildozer/android/platform/android-sdk
        rm -rf $SDK
        mkdir -p $SDK
        
        cd /tmp
        SDKMGR=$(find . -name "sdkmanager" -type f | head -1)
        echo "Found sdkmanager at: $SDKMGR"
        
        # Copy everything to SDK
        cp -r cmdline-tools $SDK/ 2>/dev/null || mkdir -p $SDK/cmdline-tools && find . -path "*/bin/sdkmanager" -exec dirname {} \; | head -1 | xargs -I{} cp -r {}/* $SDK/cmdline-tools/
        
        # Create tools/bin for buildozer
        mkdir -p $SDK/tools/bin
        SDKMGR_PATH=$(find $SDK -name "sdkmanager" -type f | head -1)
        cp $SDKMGR_PATH $SDK/tools/bin/sdkmanager
        
        yes | $SDK/tools/bin/sdkmanager --sdk_root=$SDK --licenses
        $SDK/tools/bin/sdkmanager --sdk_root=$SDK "platform-tools" "platforms;android-33" "build-tools;33.0.0"
        
        cp $SDK/build-tools/33.0.0/aidl $SDK/tools/bin/ 2>/dev/null
        echo "SDK done"
    - name: Build APK
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        buildozer android debug
    - uses: actions/upload-artifact@v4
      with:
        name: LocalPulseAI-APK
        path: bin/*.apk
