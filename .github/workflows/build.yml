name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Java 8
      run: |
        sudo apt-get update
        sudo apt-get install -y zlib1g-dev autoconf automake libtool cmake git zip unzip wget
        # Install Java 8 from adoptium
        wget -qO- https://packages.adoptium.net/artifactory/api/gpg/key/public | sudo apt-key add -
        sudo add-apt-repository --yes https://packages.adoptium.net/artifactory/deb
        sudo apt-get update
        sudo apt-get install -y temurin-8-jdk
        export JAVA_HOME=/usr/lib/jvm/temurin-8-jdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        java -version
        pip install buildozer cython pillow
    - name: Create icons
      run: |
        mkdir -p assets
        export JAVA_HOME=/usr/lib/jvm/temurin-8-jdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        python -c "from PIL import Image, ImageDraw; img = Image.new('RGBA', (1024, 1024), (79, 70, 229, 255)); draw = ImageDraw.Draw(img); draw.ellipse([200, 200, 824, 824], fill=(16, 185, 129, 255)); img.save('assets/icon.png'); splash = Image.new('RGB', (1080, 1920), (79, 70, 229)); splash.save('assets/splash.png'); print('done')"
    - name: Setup Android SDK
      run: |
        export JAVA_HOME=/usr/lib/jvm/temurin-8-jdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        SDK=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK && cd $SDK
        wget -q https://dl.google.com/android/repository/sdk-tools-linux-4333796.zip
        unzip -qo sdk-tools-linux-4333796.zip
        yes | tools/bin/sdkmanager --licenses --sdk_root=$SDK
        tools/bin/sdkmanager --sdk_root=$SDK "platform-tools" "platforms;android-33" "build-tools;33.0.0"
    - name: Build APK
      run: |
        export JAVA_HOME=/usr/lib/jvm/temurin-8-jdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        buildozer android debug
    - uses: actions/upload-artifact@v4
      with:
        name: LocalPulseAI-APK
        path: bin/*.apk
