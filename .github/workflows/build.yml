name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-11-jdk zlib1g-dev autoconf automake libtool cmake git zip unzip wget
        sudo update-alternatives --set java /usr/lib/jvm/java-11-openjdk-amd64/bin/java
        java -version
        pip install buildozer cython pillow
    
    - name: Create icons
      run: |
        mkdir -p assets
        python -c "
        from PIL import Image, ImageDraw
        img = Image.new('RGBA', (1024, 1024), (79, 70, 229, 255))
        draw = ImageDraw.Draw(img)
        draw.ellipse([200, 200, 824, 824], fill=(16, 185, 129, 255))
        img.save('assets/icon.png')
        splash = Image.new('RGB', (1080, 1920), (79, 70, 229))
        splash.save('assets/splash.png')
        "
    
    - name: Pre-create SDK directory with aidl
      run: |
        SDK=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK/tools/bin
        
        # Download just build-tools and extract aidl
        cd /tmp
        wget -q https://dl.google.com/android/repository/build-tools_r33-linux.zip
        unzip -q build-tools_r33-linux.zip
        cp android-13/aidl $SDK/tools/bin/
        chmod +x $SDK/tools/bin/aidl
        echo "aidl installed at:"
        ls -la $SDK/tools/bin/aidl

    - name: Build APK
      run: buildozer android debug
    
    - uses: actions/upload-artifact@v4
      with:
        name: LocalPulseAI-APK
        path: bin/*.apk
