name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system deps
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk zlib1g-dev autoconf automake libtool cmake git zip unzip wget
    
    - name: Install Python deps
      run: |
        pip install --upgrade pip
        pip install buildozer cython pillow
    
    - name: Create icons
      run: |
        mkdir -p assets
        python -c "
        from PIL import Image, ImageDraw
        img = Image.new('RGBA', (1024, 1024), (79, 70, 229, 255))
        draw = ImageDraw.Draw(img)
        draw.ellipse([200, 200, 824, 824], fill=(16, 185, 129, 255))
        img.save('assets/icon.png')
        splash = Image.new('RGB', (1080, 1920), (79, 70, 229))
        splash.save('assets/splash.png')
        print('Icons created')
        "
    
    - name: Build APK
      run: |
        buildozer android debug
    
    - name: Fix missing aidl
      if: failure()
      run: |
        echo "Installing aidl..."
        ANDROID_HOME=$(find /home/runner/.buildozer -name "android-sdk" -type d 2>/dev/null | head -1)
        if [ -n "$ANDROID_HOME" ]; then
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0"
          cp $ANDROID_HOME/build-tools/33.0.0/aidl $ANDROID_HOME/tools/ 2>/dev/null
          mkdir -p $ANDROID_HOME/tools/bin
          ln -sf $ANDROID_HOME/build-tools/33.0.0/aidl $ANDROID_HOME/tools/bin/aidl 2>/dev/null
        fi
        buildozer android debug
    
    - uses: actions/upload-artifact@v4
      with:
        name: LocalPulseAI-APK
        path: bin/*.apk
