name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk zlib1g-dev autoconf automake libtool cmake git zip unzip wget
        pip install buildozer cython pillow
    
    - name: Create icons
      run: |
        mkdir -p assets
        python -c "
        from PIL import Image, ImageDraw
        img = Image.new('RGBA', (1024, 1024), (79, 70, 229, 255))
        draw = ImageDraw.Draw(img)
        draw.ellipse([200, 200, 824, 824], fill=(16, 185, 129, 255))
        img.save('assets/icon.png')
        splash = Image.new('RGB', (1080, 1920), (79, 70, 229))
        splash.save('assets/splash.png')
        "

    - name: Pre-install Android SDK
      run: |
        SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_DIR/cmdline-tools
        
        cd $SDK_DIR/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest 2>/dev/null || true
        
        # Set path
        export PATH=$SDK_DIR/cmdline-tools/latest/bin:$PATH
        
        # Accept licenses
        yes | sdkmanager --licenses
        
        # Install platform tools and build tools
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
        
        # Create the tools/bin directory buildozer expects
        mkdir -p $SDK_DIR/tools/bin
        cp $SDK_DIR/build-tools/33.0.0/aidl $SDK_DIR/tools/bin/ 2>/dev/null || true
        cp $SDK_DIR/platform-tools/adb $SDK_DIR/tools/bin/ 2>/dev/null || true
        
        echo "SDK ready at $SDK_DIR"
        ls -la $SDK_DIR/tools/bin/

    - name: Build APK
      run: |
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        buildozer android debug
    
    - uses: actions/upload-artifact@v4
      with:
        name: LocalPulseAI-APK
        path: bin/*.apk
