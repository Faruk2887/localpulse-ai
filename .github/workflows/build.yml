name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Remove old Java, install Java 17
      run: |
        sudo apt-get update
        sudo apt-get remove -y openjdk-11-jdk openjdk-11-jre 2>/dev/null
        sudo apt-get install -y openjdk-17-jdk zlib1g-dev cmake git zip unzip wget
        sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
        java -version
        pip install buildozer cython pillow
    - name: Create icons
      run: |
        mkdir -p assets
        python -c "from PIL import Image, ImageDraw; img = Image.new('RGBA', (1024, 1024), (79, 70, 229, 255)); draw = ImageDraw.Draw(img); draw.ellipse([200, 200, 824, 824], fill=(16, 185, 129, 255)); img.save('assets/icon.png'); splash = Image.new('RGB', (1080, 1920), (79, 70, 229)); splash.save('assets/splash.png')"
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.0 platform-tools'
    - name: Switch to Java 8 for buildozer
      run: |
        sudo apt-get install -y openjdk-8-jdk
        export JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64
        echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
        java -version
    - name: Link SDK
      run: |
        mkdir -p $HOME/.buildozer/android/platform/android-sdk
        cp -r $ANDROID_HOME/* $HOME/.buildozer/android/platform/android-sdk/ 2>/dev/null
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
        cp $ANDROID_HOME/build-tools/33.0.0/aidl $HOME/.buildozer/android/platform/android-sdk/tools/bin/ 2>/dev/null
    - name: Build APK
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        buildozer android debug
    - uses: actions/upload-artifact@v4
      with:
        name: LocalPulseAI-APK
        path: bin/*.apk
