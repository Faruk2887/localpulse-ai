name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk openjdk-8-jdk zlib1g-dev cmake git zip unzip wget
        pip install buildozer cython pillow
    - name: Create icons
      run: |
        mkdir -p assets
        python -c "from PIL import Image, ImageDraw; img = Image.new('RGBA', (1024, 1024), (79, 70, 229, 255)); draw = ImageDraw.Draw(img); draw.ellipse([200, 200, 824, 824], fill=(16, 185, 129, 255)); img.save('assets/icon.png'); splash = Image.new('RGB', (1080, 1920), (79, 70, 229)); splash.save('assets/splash.png')"
    - name: Setup SDK (Java 17)
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      run: |
        export PATH=$JAVA_HOME/bin:$PATH
        java -version
        
        # Use GitHub's pre-installed SDK
        SDK=/usr/local/lib/android/sdk
        
        # Create the tools/bin path buildozer wants
        BUILDOZER_SDK=$HOME/.buildozer/android/platform/android-sdk
        rm -rf $BUILDOZER_SDK
        mkdir -p $BUILDOZER_SDK/tools/bin
        
        # Copy sdkmanager
        cp $SDK/cmdline-tools/latest/bin/sdkmanager $BUILDOZER_SDK/tools/bin/
        
        # Install platform tools if needed
        $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$BUILDOZER_SDK "platform-tools" "platforms;android-33" "build-tools;33.0.0"
        
        # Copy aidl
        cp $BUILDOZER_SDK/build-tools/33.0.0/aidl $BUILDOZER_SDK/tools/bin/ 2>/dev/null
        
        echo "SDK ready"
        ls $BUILDOZER_SDK/tools/bin/
    - name: Build APK (Java 8)
      env:
        JAVA_HOME: /usr/lib/jvm/java-8-openjdk-amd64
      run: |
        export PATH=$JAVA_HOME/bin:$PATH
        java -version
        buildozer android debug
    - uses: actions/upload-artifact@v4
      with:
        name: LocalPulseAI-APK
        path: bin/*.apk
