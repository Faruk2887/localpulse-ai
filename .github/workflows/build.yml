name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk zlib1g-dev autoconf automake libtool cmake git zip unzip wget
        pip install buildozer cython pillow
    
    - name: Create icons
      run: |
        mkdir -p assets
        python -c "
        from PIL import Image, ImageDraw
        img = Image.new('RGBA', (1024, 1024), (79, 70, 229, 255))
        draw = ImageDraw.Draw(img)
        draw.ellipse([200, 200, 824, 824], fill=(16, 185, 129, 255))
        img.save('assets/icon.png')
        splash = Image.new('RGB', (1080, 1920), (79, 70, 229))
        splash.save('assets/splash.png')
        "

    - name: Setup Android SDK
      env:
        JAVA_OPTS: -XX:+IgnoreUnrecognizedVMOptions --add-modules java.se.ee
      run: |
        SDK=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK
        cd $SDK
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        
        # Buildozer expects tools/bin/sdkmanager
        mkdir -p tools/bin
        ln -sf $SDK/cmdline-tools/bin/sdkmanager $SDK/tools/bin/sdkmanager 2>/dev/null
        
        # Use the new sdkmanager
        export PATH=$SDK/cmdline-tools/bin:$PATH
        
        yes | sdkmanager --sdk_root=$SDK --licenses
        sdkmanager --sdk_root=$SDK "platform-tools" "platforms;android-33" "build-tools;33.0.0"
        
        # Copy aidl where buildozer looks
        mkdir -p $SDK/tools/bin
        cp $SDK/build-tools/33.0.0/aidl $SDK/tools/bin/ 2>/dev/null
        echo "SDK setup done"
        ls $SDK/tools/bin/

    - name: Build APK
      run: buildozer android debug
    
    - uses: actions/upload-artifact@v4
      with:
        name: LocalPulseAI-APK
        path: bin/*.apk
